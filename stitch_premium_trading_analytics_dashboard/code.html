<body class="bg-surface-container-lowest text-on-surface font-body-md overflow-hidden h-screen flex flex-col">

<div class="absolute inset-0 bg-[#0B1020]">

<!-- Ambient Glow Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest to-transparent"></div>
</div>
<!-- Brand Identity Over Visual -->
<div class="relative z-10 flex flex-col items-center justify-center h-full px-lg text-center">
<span class="text-primary font-label-mono text-label-mono mb-sm tracking-[0.2em]">INSTITUTIONAL GRADE</span>
<h1 class="text-on-surface font-headline-lg-mobile text-headline-lg-mobile tracking-widest font-extrabold uppercase">
                TRADING JOURNAL PRO
            </h1>
<div class="mt-md flex space-x-base">
<div class="h-1 w-8 rounded-full bg-primary"></div>
<div class="h-1 w-2 rounded-full bg-secondary opacity-50"></div>
<div class="h-1 w-2 rounded-full bg-secondary opacity-30"></div>
</div>
</div>
</section>
<!-- Bottom Form Section (Split Screen Bottom) -->
<section class="flex-grow flex flex-col bg-surface-container-lowest relative">
<div class="glass-panel w-full h-full rounded-t-[32px] p-xl flex flex-col shadow-[0_-20px_40px_rgba(0,0,0,0.4)]">
<div class="mb-xl">
<h2 class="text-on-surface font-title-md text-title-md mb-xs">Welcome Back</h2>
<p class="text-on-surface-variant font-body-md text-body-md">Authenticate to access your secure terminal.</p>
</div>
<!-- Login Form -->
<form class="space-y-lg flex-grow">
<!-- Username/Email -->
<div class="space-y-xs">
<label class="text-on-surface-variant font-label-mono text-label-mono ml-xs">IDENTIFIER</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[18px]">person</span>
<input class="w-full bg-[#0B1020] border-none rounded-xl py-md pl-xl pr-md text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-secondary transition-all outline-none" placeholder="Username or Professional Email" type="text"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="text-on-surface-variant font-label-mono text-label-mono">PASSPHRASE</label>
<a class="text-secondary font-label-mono text-label-mono hover:underline" href="#">RECOVER ACCESS</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline text-[18px]">lock</span>
<input class="w-full bg-[#0B1020] border-none rounded-xl py-md pl-xl pr-md text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-secondary transition-all outline-none" placeholder="••••••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline/50 text-[18px]">visibility</span>
</div>
</div>
<!-- Primary Action -->
<button class="w-full primary-gradient text-on-primary font-title-md text-body-md py-md rounded-xl font-bold shadow-lg shadow-primary-container/20 active:scale-95 transition-transform" type="submit">
                    ESTABLISH CONNECTION
                </button>
</form>
<!-- Social/Institutional Auth -->
<div class="mt-xl space-y-md">
<div class="relative flex items-center justify-center">
<div class="w-full border-t border-outline-variant/20"></div>
<span class="absolute bg-surface-container/80 px-md text-on-surface-variant font-label-mono text-label-mono">OR USE SECONDARY AUTH</span>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center space-x-sm py-md rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">google</span>
<span class="font-label-mono text-label-mono">GOOGLE</span>
</button>
<button class="flex items-center justify-center space-x-sm py-md rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="font-label-mono text-label-mono">API KEY</span>
</button>
</div>
</div>
<!-- Footer Signup -->
<div class="mt-auto pt-xl text-center">
<p class="text-on-surface-variant font-body-md text-body-md">
                    First time at the terminal? 
                    <a class="text-secondary font-bold ml-xs" href="#">Request Access</a>
</p>
</div>
</div>
</section>
<!-- Minimal Overlay Security Indicator -->
<div class="fixed top-md right-md z-50 flex items-center space-x-xs bg-surface-container-high/60 backdrop-blur-md px-sm py-xs rounded-full border border-outline-variant/20">
<span class="material-symbols-outlined text-secondary text-[14px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-label-mono text-secondary">SSL_ENCRYPTED</span>
</div>
